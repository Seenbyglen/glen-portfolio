<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography — Glen Edward</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0908;
      --text: #F2F4F3;
      --muted: #A9927D;
      --accent: #A9927D;
      --accent-light: #5E503F;
      --border: #5E503F;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #0A0908;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 4rem;
      text-align: center;
      opacity: 1;
      transition: opacity 1.5s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash.hidden {
      display: none;
    }

    .splash-quote {
      font-family: var(--serif);
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      font-style: italic;
      line-height: 1.75;
      color: #F2F4F3;
      max-width: 700px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 2s ease, transform 2s ease;
    }

    .splash-quote.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .splash-attr {
      font-family: var(--sans);
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #A9927D;
      margin-top: 1rem;
      opacity: 0;
      transition: opacity 1s ease 1.5s;
    }

    .splash-attr.visible {
      opacity: 1;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(10,9,8,0.95);
      backdrop-filter: blur(10px);
    }

    .nav-name {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 400;
      text-decoration: none;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }

    /* ── MASONRY GRID ── */
    .grid-container {
      padding: 6rem 1.5rem 4rem;
      columns: 3;
      column-gap: 6px;
    }

    .grid-item {
      break-inside: avoid;
      margin-bottom: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: block;
    }

    .grid-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: brightness(0.92);
    }

    .grid-item:hover img {
      transform: scale(1.03);
      filter: brightness(1);
    }

    .grid-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(17,17,16,0);
      transition: background 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 1.25rem;
    }

    .grid-item:hover .grid-item-overlay {
      background: rgba(17,17,16,0.35);
    }

    .grid-item-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(250,250,248,0);
      transition: color 0.3s;
      font-family: var(--sans);
    }

    .grid-item:hover .grid-item-label {
      color: rgba(250,250,248,0.8);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,9,8,0.98);
      z-index: 1000;
      overflow-y: auto;
    }

    .lightbox-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 5rem 2rem 4rem;
    }

    .lightbox-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .lightbox-title {
      font-family: var(--serif);
      font-size: 1.75rem;
      font-weight: 300;
      color: var(--text);
      font-style: italic;
    }

    .lightbox-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--sans);
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: var(--text); }

    .lightbox-grid {
      columns: 2;
      column-gap: 6px;
    }

    .lightbox-grid img {
      width: 100%;
      display: block;
      margin-bottom: 6px;
      break-inside: avoid;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--bg);
      border-top: 1px solid rgba(250,250,248,0.06);
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .grid-container { columns: 2; }
      nav { padding: 1rem 1.5rem; }
    }

    @media (max-width: 600px) {
      .grid-container { columns: 1; padding: 5rem 0.75rem 3rem; }
      .nav-links { display: none; }
      .lightbox-grid { columns: 1; }
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════
       SPLASH SCREEN / OPENING QUOTE
  ════════════════════════════════════════ -->
  <div id="splash">
    <div>
      <p class="splash-quote" id="splash-quote">"To see someone and center their story is to say: you were here, you mattered, and I was paying attention."</p>
      <p class="splash-attr" id="splash-attr">&mdash; Glen Edward, M.Ed.</p>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       NAV
  ════════════════════════════════════════ -->
  <nav>
    <a href="index.html" class="nav-name">Glen Edward, M.Ed.</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Photography</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="info.html">Info</a></li>
    </ul>
  </nav>

  <!-- ════════════════════════════════════════
       MASONRY PHOTO GRID
  ════════════════════════════════════════ -->
  <div class="grid-container" id="photo-grid">
    <!-- Photos injected by JS -->
  </div>

  <!-- ════════════════════════════════════════
       LIGHTBOX (SHOOT VIEWER)
  ════════════════════════════════════════ -->
  <div id="lightbox">
    <div class="lightbox-inner">
      <div class="lightbox-header">
        <h2 class="lightbox-title" id="lightbox-title"></h2>
        <button class="lightbox-close" onclick="closeLightbox()">Close &times;</button>
      </div>
      <div class="lightbox-grid" id="lightbox-grid"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════ -->
  <footer>
    <span>&copy; 2026 Glen Edward. All rights reserved.</span>
    <span style="font-family:'Cormorant Garamond',serif;font-style:italic;">Seeing people. Centering stories.</span>
    <span><a href="https://www.instagram.com/seenbyglen/" target="_blank" rel="noopener">
      <img src="https://raw.githubusercontent.com/Seenbyglen/glen-portfolio/main/instagram-logo.png" alt="Instagram" style="width:20px;height:20px;opacity:0.6;vertical-align:middle;" />
    </a></span>
  </footer>

  <!-- ════════════════════════════════════════
       JAVASCRIPT
  ════════════════════════════════════════ -->
  <script>

    // To add a new shoot, copy a shoot block and fill in your photo URLs.
    // To add photos to an existing shoot, add more objects to its photos array.

    const shoots = [
      {

          { url: 'https://raw.githubusercontent.com/Seenbyglen/glen-portfolio/main/IMG_5381.jpeg' },

        ]
      },
      {

          { url: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80' },
          { url: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=800&q=80' },
          { url: 'https://images.unsplash.com/photo-1444723121867-7a241cacace9?w=800&q=80' },
          { url: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=800&q=80' }

        name: 'Witness',
        cover: 'https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=800&q=80',
        photos: [
          { url: 'https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=800&q=80' },
          { url: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=800&q=80' },

          { url: 'https://images.unsplash.com/photo-1552058544-f2b08422138a?w=800&q=80' }
        ]
      },
      // ── ADD MORE SHOOTS BELOW ──
      // {
      //   id: 'shoot-name',
      //   name: 'Shoot Name',
      //   cover: 'https://raw.githubusercontent.com/Seenbyglen/glen-portfolio/main/YOUR-COVER-PHOTO.jpeg',
      //   photos: [
      //     { url: 'https://raw.githubusercontent.com/Seenbyglen/glen-portfolio/main/PHOTO1.jpeg' },
      //     { url: 'https://raw.githubusercontent.com/Seenbyglen/glen-portfolio/main/PHOTO2.jpeg' },
      //   ]
      // },
    ];

    // ── SHUFFLE FUNCTION ─────────────────────
    function shuffle(arr) {
      return arr
        .map(item => ({ item, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(({ item }) => item);
    }

    // ── BUILD GRID ───────────────────────────
    function buildGrid() {
      const grid = document.getElementById('photo-grid');

      // Collect all cover photos, shuffled randomly
      const allCovers = shuffle(shoots);

      allCovers.forEach(shoot => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.onclick = () => openLightbox(shoot.id);
        item.innerHTML = `
          <img src="${shoot.cover}" alt="${shoot.name}" loading="lazy" />
          <div class="grid-item-overlay">
            <span class="grid-item-label">${shoot.name}</span>
          </div>
        `;
        grid.appendChild(item);
      });
    }

    // ── LIGHTBOX ─────────────────────────────
    function openLightbox(id) {
      const shoot = shoots.find(s => s.id === id);
      if (!shoot) return;

      document.getElementById('lightbox-title').textContent = shoot.name;
      const grid = document.getElementById('lightbox-grid');
      grid.innerHTML = shoot.photos.map(p =>
        `<img src="${p.url}" alt="${shoot.name}" loading="lazy" />`
      ).join('');

      document.getElementById('lightbox').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    // Close on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });

    // ── INIT ─────────────────────────────────
    buildGrid();

  </script>
</body>
</html>
